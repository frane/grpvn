name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: go build -v ./...
      - name: Vet
        run: go vet ./...
      - name: Build test binary
        shell: bash
        run: |
          mkdir -p .build
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          go build -o ".build/grpvn$ext" ./cmd/grpvn
          echo "GRPVN_TEST_BIN=$PWD/.build/grpvn$ext" >> "$GITHUB_ENV"
      - name: Test
        run: go test -race -v ./...
      - name: Fmt
        if: matrix.os == 'ubuntu-latest'
        run: |
          gofmt -l . | tee /tmp/fmt.out
          test ! -s /tmp/fmt.out

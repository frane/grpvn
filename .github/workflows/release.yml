name: release

on:
  push:
    tags:
      - 'v*'
  # Manual releases: dispatching with a tag name creates the tag on the
  # workflow's HEAD and releases it in the same run. (A tag pushed with
  # GITHUB_TOKEN would not re-trigger the on-push path, so goreleaser runs
  # here directly.)
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ github.event.inputs.tag }}"
          case "$TAG" in
            v[0-9]*) ;;
            *) echo "tag must look like v0.2.0, got: $TAG"; exit 1 ;;
          esac
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          # No force on the push: an existing remote tag pointing elsewhere
          # should fail loudly instead of being moved.
          git push origin "refs/tags/$TAG"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Run tests
        run: go test ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: 'latest'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional. When set, goreleaser pushes the cask to
          # frane/homebrew-tap. Missing token is fine: homebrew_casks.skip_upload
          # in .goreleaser.yaml short-circuits the cask step.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
